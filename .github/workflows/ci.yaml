name: CI

on:
  push:
    branches: [main, lab4]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [main, lab4]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      static:
        description: 'static build'
        type: boolean
        required: true
        default: true
      Environnement:
        description: 'Node environment'
        type: choice
        required: true
        default: PROD
        options:
          - QA
          - PROD


env:
  NODE_VERSION: 22

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.inputs.static == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: 2048-app-build
          path: .output/
          retention-days: 7
      - name: Upload build artifact for non-main branches
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.event.inputs.static == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: 2048-app-build
          path: .output/
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm test
  
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Simulate deployment
        env:
          ENVIRONMENT: ${{ github.event.inputs.Environnement }}
        run: echo "Deploying to $ENVIRONMENT"
